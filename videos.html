<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ehsan Ghari | Video Portfolio</title>
    
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --bg: #000000;
            --accent: #FF9900;
            --text: #ffffff;
            --gray: #666666;
            --card-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 6%; position: fixed; width: 100%; top: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(20px); z-index: 100;
            border-bottom: 1px solid var(--card-border);
        }
        .logo { font-weight: 800; font-size: 1.3rem; color: #fff; text-decoration: none; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .back-link { 
            color: #fff; text-decoration: none; font-size: 0.85rem; font-weight: 600; 
            display: flex; align-items: center; gap: 8px; transition: 0.2s; opacity: 0.7;
        }
        .back-link:hover { opacity: 1; color: var(--accent); }

        /* --- MAIN CONTAINER --- */
        .container { max-width: 1000px; margin: 180px auto 80px; padding: 0 20px; }
        .page-title { text-align: center; margin-bottom: 70px; color: var(--accent); font-size: 0.8rem; letter-spacing: 4px; font-weight: 800; text-transform: uppercase; opacity: 0.8; }

        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 70px; }
        .column-header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; font-size: 1.1rem; font-weight: 700; border-left: 2px solid var(--accent); padding-left: 15px; letter-spacing: -0.3px; }

        .video-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 22px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .video-item span { color: var(--gray); font-size: 0.95rem; font-weight: 500; transition: 0.3s; }
        .video-item i { color: var(--accent); opacity: 0; transform: translateX(-10px); transition: 0.3s; }
        
        .video-item:hover { padding-left: 10px; }
        .video-item:hover span { color: #fff; }
        .video-item:hover i { opacity: 1; transform: translateX(0); }

        /* --- LUXURY MODAL PLAYER --- */
        .video-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(25px); padding: 20px;
        }
        .modal-content { 
            width: 100%; max-width: 850px; 
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            transition: max-width 0.4s ease;
        }
        
        /* پایه افقی ویدیو (YouTube) */
        .video-modal video { 
            width: 100%; max-height: 68vh; 
            border-radius: 16px; box-shadow: 0 0 60px rgba(255,153,0,0.15); 
            background: #000; border: 1px solid rgba(255,255,255,0.05);
        }

        /* استایل اختصاصی و هوشمند هوور ریلز عمودی */
        .video-modal.vertical-mode .modal-content {
            max-width: 350px; /* شبیه‌ساز ابعاد گوشی در دسکتاپ */
        }

        .close-video { 
            background: rgba(255,255,255,0.05); color: #fff; 
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.08);
        }
        .close-video:hover { background: var(--accent); color: #000; transform: rotate(90deg); border-color: var(--accent); }

        .modal-back-btn {
            background: #0a0a0a; color: #aaa; border: 1px solid rgba(255,255,255,0.08);
            padding: 12px 35px; border-radius: 50px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        .modal-back-btn:hover { background: #fff; color: #000; border-color: #fff; }

        footer { text-align: center; padding: 60px; color: #222; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.02); margin-top: 100px; }

        @media (max-width: 800px) { 
            .video-grid { grid-template-columns: 1fr; gap: 45px; } 
            .container { margin-top: 140px; }
        }
    </style>
</head>
<body>

    <nav>

    <div class="video-modal" id="vModal">
        <div class="modal-content">
            <div class="close-video" onclick="closeVideo()">
                <i data-feather="x"></i>
            </div>

            <video id="mainPlayer" controls controlsList="nodownload">
                <source src="" type="video/mp4">
            </video>

            <button class="modal-back-btn" onclick="closeVideo()">
                <span>Back to Portfolio</span>
            </button>
        </div>
    </div>

    <footer><p>&copy; 2026 Ehsan Ghari. Professional Video Editor.</p></footer>

    <script>
        feather.replace();
        const modal = document.getElementById('vModal');
        const player = document.getElementById('mainPlayer');

        function playVideo(src, type) {
            if (type === 'vertical') {
                modal.classList.add('vertical-mode');
            } else {
                modal.classList.remove('vertical-mode');
            }
            player.src = src;
            modal.style.display = 'flex';
            player.play();
        }

        function closeVideo() {
            modal.style.display = 'none';
            player.pause();
            player.src = "";
        }

        window.onclick = (e) => { if(e.target == modal) closeVideo(); }
    </script>
</body>
</html>
