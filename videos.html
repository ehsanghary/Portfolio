<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>Ehsan Ghari | Video Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --bg: #050505;
            --accent: #FF9900;
            --text: #ffffff;
            --gray: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: fixed; width: 100%; top: 0;
            background: rgba(5,5,5,0.85); backdrop-filter: blur(15px); z-index: 100;
            border-bottom: 1px solid #1a1a1a; direction: ltr;
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--accent); text-decoration: none; }
        .back-link { 
            color: #fff; text-decoration: none; font-size: 0.9rem; font-weight: 600; 
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .back-link:hover { color: var(--accent); }

        .container { max-width: 900px; margin: 150px auto 80px; padding: 0 20px; }
        .page-title { text-align: center; margin-bottom: 60px; color: var(--accent); font-size: 0.8rem; letter-spacing: 4px; font-weight: 800; text-transform: uppercase; }

        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
        .column-header { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; font-size: 1.1rem; font-weight: 800; border-right: 3px solid var(--accent); padding-right: 15px; }

        /* --- MINIMAL ITEM --- */
        .video-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 0; border-bottom: 1px solid #151515;
            cursor: pointer; transition: 0.3s;
        }
        .video-item span { color: var(--gray); font-size: 0.95rem; transition: 0.3s; text-align: right; }
        .video-item i { color: var(--accent); opacity: 0; transform: translateX(10px); transition: 0.3s; }
        .video-item:hover { padding-right: 10px; }
        .video-item:hover span { color: #fff; }
        .video-item:hover i { opacity: 1; transform: translateX(0); }

        /* --- VIDEO MODAL IMPROVED --- */
        .video-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(15px); padding: 20px;
        }
        .modal-content { width: 100%; max-width: 850px; position: relative; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .video-modal video { width: 100%; border-radius: 12px; box-shadow: 0 0 50px rgba(255,153,0,0.1); background: #000; border: 1px solid #222; }

        /* دکمه ضربدر جدید */
        .close-video { 
            position: absolute; top: -10px; left: -10px; 
            background: var(--accent); color: #000; 
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; z-index: 1001;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .close-video:hover { transform: scale(1.1) rotate(90deg); background: #fff; }

        /* دکمه متنی بازگشت پایین ویدیو */
        .modal-back-btn {
            background: #1a1a1a; color: #fff; border: 1px solid #333;
            padding: 12px 30px; border-radius: 50px; font-size: 0.9rem;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .modal-back-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        footer { text-align: center; padding: 40px; color: #444; font-size: 0.8rem; border-top: 1px solid #111; margin-top: 40px; }

        @media (max-width: 768px) { .video-grid { grid-template-columns: 1fr; } .close-video { top: -45px; left: 50%; transform: translateX(-50%); } }
    </style>
</head>
<body>

    <div class="video-modal" id="vModal">
        <div class="modal-content">
            <div class="close-video" onclick="closeVideo()">
                <i data-feather="x" size="24"></i>
            </div>

            <video id="mainPlayer" controls controlsList="nodownload">
                <source src="" type="video/mp4">
            </video>

            <button class="modal-back-btn" onclick="closeVideo()">
                <i data-feather="arrow-right" size="18"></i>
                <span>بازگشت به لیست ویدیوها</span>
            </button>
        </div>
    </div>

    <footer><p>&copy; 2026 Ehsan Ghari. Professional Video Editor.</p></footer>

    <script>
        feather.replace();
        const modal = document.getElementById('vModal');
        const player = document.getElementById('mainPlayer');

        function playVideo(src) {
            player.src = src;
            modal.style.display = 'flex';
            player.play();
        }

        function closeVideo() {
            modal.style.display = 'none';
            player.pause();
            player.src = "";
        }

        // کلیک روی فضای تاریک هم ویدیو را می‌بندد
        window.onclick = (e) => { if(e.target == modal) closeVideo(); }
    </script>
